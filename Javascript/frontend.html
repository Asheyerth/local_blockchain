<!DOCTYPE html>
<html>
<head>
    <title>MessageBoard</title>
    <script src="https://cdn.jsdelivr.net/npm/web3@1.5.2/dist/web3.min.js"></script>
</head>
<body>
    <h1>MessageBoard</h1>
    <input id="messageInput" type="text" placeholder="Enter message">
    <button onclick="addMessage()">Add Message</button>
    <div id="messages"></div>

    <script>
        const contractAddress = "YOUR_CONTRACT_ADDRESS";
        const contractABI = [/* PASTE ABI HERE */];

        const web3 = new Web3("http://127.0.0.1:8545");
        const messageBoard = new web3.eth.Contract(contractABI, contractAddress);

        async function addMessage() {
            const message = document.getElementById("messageInput").value;
            await messageBoard.methods.addMessage(message).send({ from: (await web3.eth.getAccounts())[0] });
            updateMessages();
        }

        async function updateMessages() {
            const messages = await messageBoard.methods.getAllMessages().call();
            document.getElementById("messages").innerHTML = messages.map(m => `<p>${m}</p>`).join("");
        }

        updateMessages();
    </script>
</body>
</html>
